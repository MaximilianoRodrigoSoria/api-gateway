apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  type: ClusterIP        # El Ingress (ingress.yaml) enruta el tráfico externo al Service
  selector:
    app: api-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
